<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sera Kontrol</title>
</head>
<body>
  <h3>Sera Kontrol</h3>

  <form id="ayarForm">
    <label for="fanDerece">Fan derece çalışma ayarı:</label>
    <input id="fanDerece" type="number" step="0.1" value="30">
    <button type="submit">Kaydet</button>
  </form>

  <p>Fan durumu: <span id="fanDurumu">Pasif</span></p>

  <script>
    const ayarForm = document.getElementById("ayarForm");
    const fanDerece = document.getElementById("fanDerece");
    const fanDurumu = document.getElementById("fanDurumu");

    const kayitliDerece = localStorage.getItem("fanDerece");

    if (kayitliDerece) {
      fanDerece.value = kayitliDerece;
    }

    ayarForm.addEventListener("submit", function(event) {
      event.preventDefault();
      localStorage.setItem("fanDerece", fanDerece.value);
      fanDurumu.textContent = "Pasif";
    });
  </script>
</body>
</html>
