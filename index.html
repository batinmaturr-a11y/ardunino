<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sera</title>
</head>
<body>
  <span id="sicaklik">--</span> C

  <script>
    async function guncelle() {
      try {
        const cevap = await fetch("/sicaklik");
        const sicaklik = await cevap.text();
        document.getElementById("sicaklik").textContent = sicaklik;
      } catch (hata) {
        document.getElementById("sicaklik").textContent = "--";
      }
    }

    guncelle();
    setInterval(guncelle, 2000);
  </script>
</body>
</html>
